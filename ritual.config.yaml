ritual_version: 0.1.0
paths:
  prd: null
  design_system: null
  prototypes: null
  masterplan: MASTERPLAN.md
  buildlog: BUILDLOG.md
  followups: FOLLOWUPS.md
  taskstate: .taskstate/
  worktrees: .worktrees/
git:
  main_branch: main
  branch_pattern: task/{id_lc}-{slug}
  worktree_pattern: .worktrees/{id_lc}/
commit:
  trailer_keys:
  - Task
  squash_only: true
prefixes: {}
gates:
  format:
    cmd: npm run format:check
    light_eligible: false
  lint:
    cmd: npm run lint
    light_eligible: false
  typecheck:
    cmd: npm run typecheck
    light_eligible: true
  test:
    cmd: npm test
    light_eligible: true
  build:
    cmd: npm run build
    light_eligible: true
retry_budgets:
  check: 3
  review: 2
  auto_fix_max_lines: 20
walk:
  dev_server_cmd: npm run dev
  default_port: 3000
reviewer:
  rules_file: .claude/ritual/reviewer.project.md
  non_negotiables: []
hooks:
  pre_tool_use:
  - guard-main
  post_tool_use:
  - remind-non-negotiables
